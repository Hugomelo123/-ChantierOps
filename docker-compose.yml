version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chantierops_db
    environment:
      POSTGRES_USER: chantierops
      POSTGRES_PASSWORD: chantierops_secret
      POSTGRES_DB: chantierops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: chantierops_backend
    environment:
      DATABASE_URL: postgresql://chantierops:chantierops_secret@postgres:5432/chantierops
      PORT: 3001
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}
      JWT_SECRET: ${JWT_SECRET:-chantierops_jwt_secret}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: chantierops_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
